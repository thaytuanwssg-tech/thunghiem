<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chatbot AI</title>
</head>

<body>

<h1>Chatbot AI</h1>

<div id="chat"></div>

<input id="msg" placeholder="Nhập câu hỏi..." style="width:300px">
<button onclick="send()">Gửi</button>

<script>

async function send(){

const msg = document.getElementById("msg").value;

const chat = document.getElementById("chat");

chat.innerHTML += "<div style='color:blue'>Bạn: "+msg+"</div>";

const r = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:msg})
});

const d = await r.json();

chat.innerHTML += "<div style='color:green'>AI: "+ d.reply +"</div>";

}

</script>

</body>
</html>
